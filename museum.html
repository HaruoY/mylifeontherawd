<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a:hover { color: var(--ink); }

  .breadcrumb {
    padding: 130px 40px 0;
    max-width: 720px;
  }

  .breadcrumb a {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.03em;
  }

  .breadcrumb a:hover { color: var(--accent); }

  .museum-header {
    padding: 18px 40px 48px;
    max-width: 720px;
  }

  .museum-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .museum-header .meta {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.88rem;
  }

  .works {
    max-width: 880px;
    padding: 0 40px 100px;
    display: flex;
    flex-direction: column;
    gap: 64px;
  }

  .work {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 36px;
    align-items: start;
  }

  .work img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    border-radius: 2px;
    filter: grayscale(8%) contrast(1.05);
  }

  .work .work-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .work .work-artist {
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .work .work-description {
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--ink);
  }

  .empty-state {
    padding: 60px 40px;
    max-width: 720px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty-state a { color: var(--accent); text-decoration: underline; }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 720px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .breadcrumb { padding: 110px 22px 0; }
    .museum-header { padding: 14px 22px 32px; }
    .works { padding: 0 22px 70px; gap: 44px; }
    .work { grid-template-columns: 1fr; gap: 16px; }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a href="gallery.html">Gallery</a>
    <a href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<p class="breadcrumb"><a href="blog.html">← Back to blog</a></p>

<div class="museum-header">
  <h1 id="museum-title">Museum</h1>
  <p class="meta" id="museum-meta"></p>
</div>

<div class="works" id="works"></div>

<p class="empty-state" id="empty-state" hidden>
  No museum found. <a href="blog.html">Back to blog</a>.
</p>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const museumId = params.get('id');

  const titleEl = document.getElementById('museum-title');
  const metaEl = document.getElementById('museum-meta');
  const worksEl = document.getElementById('works');
  const emptyState = document.getElementById('empty-state');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function loadMuseum() {
    if (!museumId) {
      titleEl.textContent = 'Museum not specified';
      emptyState.hidden = false;
      return;
    }

    try {
      const res = await fetch('./blog.json');
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      const museums = await res.json();

      const museum = museums.find(m => String(m.id) === museumId);

      if (!museum) {
        titleEl.textContent = 'Museum not found';
        emptyState.hidden = false;
        return;
      }

      titleEl.textContent = museum.nome;
      document.title = `${museum.nome} — My life on the rawd`;
      metaEl.textContent = museum.luogo || '';

      const opere = museum.opere || [];

      if (opere.length === 0) {
        worksEl.innerHTML = '';
        emptyState.hidden = false;
        emptyState.textContent = 'No works added for this museum yet.';
        return;
      }

      worksEl.innerHTML = opere.map(opera => `
        <article class="work">
          <img src="${opera.immagine_url}" alt="${escapeHtml(opera.titolo || '')}" loading="lazy">
          <div>
            <div class="work-title">${escapeHtml(opera.titolo || '')}</div>
            <div class="work-artist">${escapeHtml(opera.artista || '')}</div>
            <p class="work-description">${escapeHtml(opera.descrizione || '')}</p>
          </div>
        </article>
      `).join('');
    } catch (err) {
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load this museum right now.';
      console.error('Error loading museum:', err);
    }
  }

  loadMuseum();
</script>

</body>
</html>
