<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — My life on the rawd</title>
<link href="fonts.css" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
    --green: #2D9B5A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    padding: 0 24px;
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--muted);
    margin-bottom: 48px;
    display: block;
    text-decoration: none;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: 1.6rem;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 0.83rem;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  .field input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 13px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.88; }

  .error { display: none; margin-top: 16px; font-size: 0.8rem; color: var(--accent); text-align: center; }
  .error.show { display: block; }
</style>
</head>
<body>

<div class="login-box">
  <a class="logo" href="index.html">My life on the rawd</a>
  <h1>Admin</h1>
  <p class="subtitle">Enter your password to access the upload panel.</p>

  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn" onclick="login()">Enter</button>
  <p class="error" id="error">Wrong password.</p>
</div>

<script>
  if (sessionStorage.getItem('rawd-admin') === '1') {
    window.location.href = 'carica.html';
  }

  function login() {
    const pwd = document.getElementById('pwd').value;
    const HASH = 'f5be3d84197f4ce4565d7b86814bc4a4756fe36687bffda7e545139a319788d6';
    sha256(pwd).then(h => {
      if (h === HASH) {
        sessionStorage.setItem('rawd-admin', '1');
        window.location.href = 'carica.html';
      } else {
        document.getElementById('error').classList.add('show');
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    });
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
</script>
</body>
</html>
