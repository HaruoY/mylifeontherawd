<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My life on the rawd</title>
<link href="fonts.css" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  a { color: inherit; text-decoration: none; }

  .landing {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }

  .landing-photo-frame {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .landing-photo-frame img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(15%) contrast(1.05) brightness(0.8);
  }

  /* ---------- HEADER / NAV ---------- */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px 0;
    padding: 30px 40px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.25;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
  }

  .logo .bar {
    width: 2px;
    height: 44px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .logo .tagline {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin-top: 4px;
    opacity: 0.85;
    text-transform: none;
  }

  nav {
    display: flex;
    gap: 30px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  nav a {
    position: relative;
    padding: 14px 0 8px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
  }

  nav a::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 1px;
    background: rgba(242,238,228,0.4);
    transition: background 0.25s ease;
  }

  nav a:hover::before,
  nav a.active::before {
    background: var(--accent);
  }

  /* ---------- TITLE ---------- */
  .landing-title {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 24px;
  }

  .landing-title h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    color: var(--accent);
    font-size: clamp(2.2rem, 8vw, 5.8rem);
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    text-shadow: 0 2px 24px rgba(0,0,0,0.6);
    -webkit-text-stroke: 1.5px var(--ink);
    paint-order: stroke fill;
  }

  @media (max-width: 720px) {
    header { padding: 22px 20px; }
    .logo { font-size: 0.78rem; }
    .logo .bar { height: 38px; }
    .logo .tagline { font-size: 0.52rem; max-width: 200px; }
    nav { gap: 18px; font-size: 0.65rem; flex-wrap: wrap; }
  }

  @media (max-width: 420px) {
    .logo .tagline { display: none; }
    .logo .bar { height: 28px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<div class="landing">
  <div class="landing-photo-frame">
    <img src="images/landing-cover.jpg" alt="">
  </div>

  <header>
    <div class="logo">
      <span class="bar"></span>
      <span>
        My life<br>on the rawd
        <span class="tagline">Life is photography we develop from negatives</span>
      </span>
    </div>
    <nav>
      <a class="active" href="map.html">Map</a>
      <a href="travel.html">Travel</a>
      <a href="blog.html">Blog</a>
      <a href="bio.html">Bio</a>
      <a href="gear.html">Gear</a>
    </nav>
  </header>

  <div class="landing-title">
    <h1>My life on the rawd</h1>
  </div>
</div>

</body>
</html>
