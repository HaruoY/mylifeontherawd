<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My life on the rawd — Fotografia di viaggio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --bg: #FAFAF8;
    --ink: #1D191A;
    --muted: #6B6B63;
    --accent: #EE1337;
    --line: rgba(10,10,10,0.1);
    --gap: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  /* ---------- HEADER ---------- */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(250,250,248,0.92), rgba(250,250,248,0));
    pointer-events: none;
  }

  header * { pointer-events: auto; }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  nav {
    display: flex;
    gap: 28px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  nav a {
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    padding: 4px 0;
    position: relative;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  /* ---------- INTRO STRIP ---------- */
  .intro {
    padding: 150px 40px 56px;
    max-width: 760px;
  }

  .intro h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(1.9rem, 4vw, 2.8rem);
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--accent);
  }

  .intro h1 em {
    font-style: italic;
  }

  /* ---------- MAP ---------- */
  .map-section {
    padding: 0 40px 56px;
  }

  #world-map {
    width: 100%;
  }

  #world-map svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  #world-map .land {
    fill: #E5E2D6;
    stroke: var(--bg);
    stroke-width: 0.5;
  }

  .map-marker {
    cursor: pointer;
  }

  .map-marker circle.dot {
    fill: var(--accent);
    transition: r 0.2s ease;
  }

  .map-marker:hover circle.dot {
    r: 5.5;
  }

  .map-marker circle.pulse {
    fill: var(--accent);
    opacity: 0.2;
    transform-origin: center;
    animation: pulse 2.6s ease-in-out infinite;
  }

  .map-marker text {
    font-family: 'Fraunces', serif;
    font-size: 11px;
    fill: var(--ink);
    transition: fill 0.2s ease;
  }

  .map-marker:hover text {
    fill: var(--accent);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.22; }
    50% { transform: scale(1.6); opacity: 0.06; }
  }

  .map-caption {
    margin-top: 12px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* ---------- GALLERY GRID ---------- */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: 0 0 80px;
  }

  .item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: #e8e6e0;
  }

  /* mosaic rhythm: some cells span wider — deliberate, not random */
  .item.wide { grid-column: span 2; }
  .item.tall { grid-row: span 2; }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    aspect-ratio: 4/5;
    filter: grayscale(8%);
    transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }

  .item.wide img, .item.tall img { aspect-ratio: auto; height: 100%; }

  .item:hover img {
    transform: scale(1.035);
    filter: grayscale(0%);
  }

  .item-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    background: linear-gradient(to top, rgba(10,10,10,0.55), transparent);
    color: #fff;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .item:hover .item-meta {
    opacity: 1;
    transform: translateY(0);
  }

  .item-meta .place {
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 400;
  }

  .item-meta .coords {
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.75);
    font-variant-numeric: tabular-nums;
  }

  .item.hidden { display: none; }

  .empty-state {
    padding: 60px 40px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ---------- FOOTER ---------- */
  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .intro { padding: 110px 22px 32px; }
    .map-section { padding: 0 22px 40px; }
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .item.wide { grid-column: span 2; }
    footer { padding: 24px 22px 32px; }
  }

  @media (max-width: 520px) {
    .gallery { grid-template-columns: 1fr; }
    .item.wide { grid-column: span 1; }
    .item.tall { grid-row: span 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; scroll-behavior: auto !important; }
  }

  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a class="active" href="index.html">Home</a>
    <a href="bio.html">Bio</a>
    <a href="projects.html">Projects</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<section class="intro">
  <h1>Life is like photography — <em>we develop from the negatives</em>.</h1>
</section>

<section class="map-section">
  <div id="world-map" role="img" aria-label="Mappa dei luoghi visitati, cliccabile"></div>
  <p class="map-caption" id="map-caption"></p>
</section>

<div class="gallery" id="gallery">
  <!-- Popolata dinamicamente da loadPhotos() via fetch a foto.json -->
</div>

<p id="empty-state" class="empty-state" hidden>
  Nessuno scatto disponibile, per ora.
</p>

<footer>
  <span>© 2026 — Tutti i diritti riservati</span>
</footer>

<script>

  const API_URL = './foto.json';

  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');
  const mapCaption = document.getElementById('map-caption');

  let photos = [];

  // Indice per applicare il ritmo mosaico (wide/tall) senza doverlo
  // specificare a mano nei dati — ogni 5° elemento è "wide".
  function layoutClass(index) {
    if (index % 5 === 0) return 'wide';
    if (index % 7 === 3) return 'tall';
    return '';
  }

  function formatCoords(lat, lng) {
    if (lat == null || lng == null || lat === '' || lng === '') return '';
    const ns = lat >= 0 ? 'N' : 'S';
    const ew = lng >= 0 ? 'E' : 'O';
    return `${Math.abs(lat).toFixed(2)}° ${ns}, ${Math.abs(lng).toFixed(2)}° ${ew}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderGallery() {
    gallery.innerHTML = photos.map((photo, i) => `
      <a class="item ${layoutClass(i)}" href="${photo.immagine_url}" target="_blank" rel="noopener">
        <img src="${photo.immagine_url}" alt="${escapeHtml(photo.titolo || '')}" loading="lazy">
        <div class="item-meta">
          <span class="place">${escapeHtml(photo.luogo || '')}</span>
          <span class="coords">${formatCoords(photo.lat, photo.lng)}</span>
        </div>
      </a>
    `).join('');

    emptyState.hidden = photos.length > 0;
  }

  const mapContainer = document.getElementById('world-map');
  let mapProjection = null;
  let mapSvg = null;
  let worldLoaded = false;

  const MAP_WIDTH = 680;
  const MAP_HEIGHT = 360;

  async function initMap() {
    try {
      const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
      const land = topojson.feature(world, world.objects.land);

      const projection = d3.geoNaturalEarth1()
        .fitSize([MAP_WIDTH, MAP_HEIGHT], land);
      mapProjection = projection;

      const path = d3.geoPath(projection);

      mapSvg = d3.select(mapContainer)
        .append('svg')
        .attr('viewBox', `0 0 ${MAP_WIDTH} ${MAP_HEIGHT}`);

      mapSvg.append('path')
        .datum(land)
        .attr('class', 'land')
        .attr('d', path);

      mapSvg.append('g').attr('id', 'map-markers-layer');

      worldLoaded = true;
      renderMap();
    } catch (err) {
      console.error('Impossibile caricare i dati geografici:', err);
      mapCaption.textContent = '';
    }
  }

  function renderMap() {
    if (!worldLoaded || !mapProjection) return;

    const luoghiConCoordinate = photos.filter(p => p.lat != null && p.lng != null && p.luogo);

    // Raggruppa per luogo, per evitare marker sovrapposti identici
    // se più foto condividono la stessa posizione.
    const luoghiUnici = [];
    const visti = new Set();
    luoghiConCoordinate.forEach(p => {
      const chiave = p.luogo;
      if (!visti.has(chiave)) {
        visti.add(chiave);
        luoghiUnici.push(p);
      }
    });

    const markersLayer = mapSvg.select('#map-markers-layer');

    const markers = markersLayer.selectAll('a.map-marker')
      .data(luoghiUnici, d => d.luogo);

    markers.exit().remove();

    const entered = markers.enter()
      .append('a')
      .attr('class', 'map-marker')
      .attr('href', d => `luogo.html?nome=${encodeURIComponent(d.luogo)}`);

    entered.append('circle').attr('class', 'pulse').attr('r', 6);
    entered.append('circle').attr('class', 'dot').attr('r', 4);
    entered.append('text').attr('text-anchor', 'middle');

    const all = entered.merge(markers);

    all.attr('transform', d => {
      const coords = mapProjection([d.lng, d.lat]);
      return coords ? `translate(${coords[0]},${coords[1]})` : 'translate(-9999,-9999)';
    });

    all.select('text')
      .attr('y', -12)
      .text(d => d.luogo);

    if (luoghiUnici.length === 0) {
      mapCaption.textContent = 'Nessun luogo geolocalizzato, per ora.';
    } else if (luoghiUnici.length === 1) {
      mapCaption.textContent = '1 luogo visitato — clicca il punto per esplorare.';
    } else {
      mapCaption.textContent = `${luoghiUnici.length} luoghi visitati — clicca un punto per esplorare.`;
    }
  }

  async function loadPhotos() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`Risposta non valida: ${res.status}`);
      photos = await res.json();
      renderGallery();
      renderMap();
    } catch (err) {
      gallery.innerHTML = '';
      emptyState.hidden = false;
      emptyState.textContent = 'Impossibile caricare gli scatti in questo momento. Riprova più tardi.';
      mapCaption.textContent = '';
      console.error('Errore nel caricamento delle foto:', err);
    }
  }

  // Avvia in parallelo il caricamento delle foto e della mappa geografica.
  // renderMap() viene chiamata da entrambi i flussi e si protegge da sola
  // controllando worldLoaded — produce risultato corretto indipendentemente
  // da quale delle due richieste di rete termina prima.
  Promise.all([loadPhotos(), initMap()]);
</script>

</body>
</html>
