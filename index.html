<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  a { color: inherit; text-decoration: none; }

  .landing {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .landing-photo-frame {
    position: relative;
    width: min(60vw, 560px);
    height: min(80vh, 760px);
    overflow: hidden;
  }

  .landing-photo-frame img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(15%) contrast(1.05);
  }

  .landing-title {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 24px;
  }

  .landing-title h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    color: var(--accent);
    font-size: clamp(2.4rem, 9vw, 6.5rem);
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }

  .landing-title .subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 1.8vw, 1.25rem);
    color: var(--accent);
    margin-top: 10px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .enter-link {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 12px 0;
    border-bottom: 1px solid var(--ink);
    transition: opacity 0.2s ease, border-color 0.2s ease;
  }

  .enter-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  @media (max-width: 720px) {
    .landing-photo-frame { width: 86vw; height: 70vh; }
    .enter-link { bottom: 40px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<div class="landing">
  <div class="landing-photo-frame">
    <img src="images/landing-cover.jpg" alt="">
  </div>

  <div class="landing-title">
    <h1>My life on the rawd</h1>
    <div class="subtitle">Life is photography — we develop from negatives.</div>
  </div>

  <a class="enter-link" href="gallery.html">Enter</a>
</div>

</body>
</html>
