<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatore Minimal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #inputs {
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }
        input {
            padding: 8px;
            margin: 4px;
            border-radius: 5px;
            border: none;
            width: 120px;
        }
        button {
            padding: 8px 15px;
            background-color: #00adb5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #compass-container {
            width: 300px;
            height: 300px;
            position: relative;
        }
        #arrow {
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
        }
        #info {
            margin-top: 20px;
            font-size: 14px;
            color: #aaaaaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="inputs">
        <input type="number" id="destLat" placeholder="Lat Destinazione" step="any" value="41.8902">
        <input type="number" id="destLon" placeholder="Lon Destinazione" step="any" value="12.4922">
        <button onclick="startNavigation()">Avvia</button>
    </div>

    <div id="compass-container">
        <svg id="arrow" viewBox="0 0 100 100">
            <polygon points="50,5 95,95 50,75 5,95" fill="#00adb5" />
        </svg>
    </div>

    <div id="info">Inserisci le coordinate e premi Avvia.<br>Richiede GPS e Bussola attivi.</div>

    <script>
        let destLat = 0;
        let destLon = 0;
        let currentLat = 0;
        let currentLon = 0;
        let deviceHeading = 0; // Direzione del telefono rispetto al Nord

        function startNavigation() {
            destLat = parseFloat(document.getElementById('destLat').value);
            destLon = parseFloat(document.getElementById('destLon').value);
            
            // Richiesta permessi per i sensori (fondamentale su iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            // Attiva il GPS ad alta precisione
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, handleError, {
                    enableHighAccuracy: true, // Estrema precisione
                    maximumAge: 0,
                    timeout: 5000
                });
            } else {
                alert("Il tuo browser non supporta il GPS.");
            }
        }

        function updatePosition(position) {
            currentLat = position.coords.coords ? position.coords.coords.latitude : position.coords.latitude;
            currentLon = position.coords.coords ? position.coords.coords.longitude : position.coords.longitude;
            updateArrow();
        }

        function handleOrientation(event) {
            // Cerca di ottenere l'orientamento corretto rispetto al Nord magnetico/geografico
            if (event.webkitCompassHeading) {
                deviceHeading = event.webkitCompassHeading; // iOS
            } else if (event.alpha) {
                deviceHeading = 360 - event.alpha; // Android (approssimato se non absolute)
            }
            updateArrow();
        }

        // Formula matematica per calcolare l'angolo tra due punti sulla Terra (Bearing)
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            lat1 = lat1 * Math.PI / 180;
            lat2 = lat2 * Math.PI / 180;

            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        function updateArrow() {
            if (currentLat === 0 && currentLon === 0) return;

            const targetBearing = calculateBearing(currentLat, currentLon, destLat, destLon);
            
            // L'angolo finale della freccia sullo schermo
            let arrowAngle = targetBearing - deviceHeading;
            
            // Applica la rotazione alla freccia SVG
            document.getElementById('arrow').style.transform = `rotate(${arrowAngle}deg)`;
            
            // Mostra info di debug
            document.getElementById('info').innerHTML = `
                La tua pos: ${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}<br>
                Angolo Meta: ${targetBearing.toFixed(1)}° | Tua Direzione: ${deviceHeading.toFixed(1)}°
            `;
        }

        function handleError(error) {
            console.warn(`Errore GPS (${error.code}): ${error.message}`);
        }
    </script>
<script src="theme-toggle.js"></script>
</body>
</html>
