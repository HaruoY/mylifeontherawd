<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
    --gap: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav {
    display: flex;
    gap: 28px;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main {
    flex: 1;
  }

  .intro {
    padding: 150px 40px 32px;
    max-width: 760px;
  }

  .intro .label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .intro h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }

  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 0 40px 48px;
  }

  .filters button {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 9px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filters button:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .filters button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: 0 0 80px;
  }

  .item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
  }

  .item.wide { grid-column: span 2; }
  .item.tall { grid-row: span 2; }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    aspect-ratio: 4/5;
    filter: grayscale(10%) contrast(1.05);
    transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }

  .item.wide img, .item.tall img { aspect-ratio: auto; height: 100%; }

  .item:hover img {
    transform: scale(1.035);
    filter: grayscale(0%) contrast(1);
  }

  .item-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .item:hover .item-meta {
    opacity: 1;
    transform: translateY(0);
  }

  .item-meta .place {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
  }

  .item-meta .coords {
    font-size: 0.65rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    padding: 60px 40px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .intro { padding: 110px 22px 24px; }
    .filters { padding: 0 22px 36px; }
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .item.wide { grid-column: span 2; }
    footer { padding: 24px 22px 32px; }
  }

  @media (max-width: 520px) {
    .gallery { grid-template-columns: 1fr; }
    .item.wide { grid-column: span 1; }
    .item.tall { grid-row: span 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; scroll-behavior: auto !important; }
  }

  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a class="active" href="gallery.html">Gallery</a>
    <a href="bio.html">Bio</a>
    <a href="projects.html">Projects</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <section class="intro">
    <div class="label">Portfolio</div>
    <h1>Stories from the road</h1>
  </section>

  <nav class="filters" id="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="reportage">Reportage</button>
    <button data-filter="street">Street</button>
    <button data-filter="architettura">Architecture</button>
    <button data-filter="arte">Art</button>
    <button data-filter="paesaggi">Landscape</button>
  </nav>

  <div class="gallery" id="gallery"></div>

  <p class="empty-state" id="empty-state" hidden>
    No shots in this category yet.
  </p>
</main>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const API_URL = './foto.json';

  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');
  const buttons = document.querySelectorAll('#filters button');

  let photos = [];
  let currentFilter = 'all';

  function layoutClass(index) {
    if (index % 5 === 0) return 'wide';
    if (index % 7 === 3) return 'tall';
    return '';
  }

  function formatCoords(lat, lng) {
    if (lat == null || lng == null || lat === '' || lng === '') return '';
    const ns = lat >= 0 ? 'N' : 'S';
    const ew = lng >= 0 ? 'E' : 'W';
    return `${Math.abs(lat).toFixed(2)}° ${ns}, ${Math.abs(lng).toFixed(2)}° ${ew}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderGallery() {
    const filtered = photos.filter(p => currentFilter === 'all' || p.categoria === currentFilter);

    gallery.innerHTML = filtered.map((photo, i) => `
      <a class="item ${layoutClass(i)}" href="${photo.immagine_url}" target="_blank" rel="noopener">
        <img src="${photo.immagine_url}" alt="${escapeHtml(photo.titolo || '')}" loading="lazy">
        <div class="item-meta">
          <span class="place">${escapeHtml(photo.luogo || '')}</span>
          <span class="coords">${formatCoords(photo.lat, photo.lng)}</span>
        </div>
      </a>
    `).join('');

    emptyState.hidden = filtered.length > 0;
  }

  async function loadPhotos() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      photos = await res.json();
      renderGallery();
    } catch (err) {
      gallery.innerHTML = '';
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load photos right now.';
      console.error('Error loading photos:', err);
    }
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGallery();
    });
  });

  loadPhotos();
</script>

</body>
</html>
