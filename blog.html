<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — My life on the rawd</title>
<link href="fonts.css" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 10px 0;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 10px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main {
    padding: 160px 40px 100px;
    max-width: 1100px;
  }

  .page-intro {
    max-width: 560px;
    margin-bottom: 56px;
  }

  .page-intro .label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .page-intro h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .page-intro p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-top: 14px;
  }

  .museums-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .museum-card {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    aspect-ratio: 4/3;
    background: var(--surface);
    border: 1px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .museum-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    filter: grayscale(100%) contrast(1.05);
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  }

  .museum-card:hover img {
    transform: scale(1.04);
    filter: grayscale(0%) contrast(1);
  }

  .museum-card .overlay {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    color: #fff;
  }

  .museum-card .overlay .museum-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.05rem;
    text-transform: uppercase;
  }

  .museum-card .overlay .museum-meta {
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-top: 4px;
  }

  .empty-state {
    padding: 60px 0;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 4px;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    main { padding: 130px 22px 70px; }
    .museums-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">My life on the rawd</a>
  <nav>
    <a href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a class="active" href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <div class="page-intro">
    <div class="label">Blog</div>
    <h1>Museums and art</h1>
    <p>Works and details encountered in museums along the way, with notes on each piece.</p>
  </div>

  <div class="museums-grid" id="museums-grid"></div>

  <p class="empty-state" id="empty-state" hidden>
    No museum albums published yet.
  </p>
</main>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const grid = document.getElementById('museums-grid');
  const emptyState = document.getElementById('empty-state');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function loadMuseums() {
    try {
      const res = await fetch('./blog.json');
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      const museums = await res.json();

      const pubblicati = museums.filter(m => m.pubblicato !== false);

      if (pubblicati.length === 0) {
        emptyState.hidden = false;
        return;
      }

      grid.innerHTML = pubblicati.map(m => {
        const copertina = m.copertina || (m.opere && m.opere[0] ? m.opere[0].immagine_url : '');
        return `
        <a class="museum-card" href="museum.html?id=${encodeURIComponent(m.id)}">
          <img src="${copertina}" alt="${escapeHtml(m.nome)}" loading="lazy">
          <div class="overlay">
            <div class="museum-name">${escapeHtml(m.nome)}</div>
            <div class="museum-meta">${escapeHtml(m.luogo || '')}${m.opere ? ' · ' + m.opere.length + (m.opere.length === 1 ? ' work' : ' works') : ''}</div>
          </div>
        </a>
      `;
      }).join('');
    } catch (err) {
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load museum albums right now.';
      console.error('Error loading museums:', err);
    }
  }

  loadMuseums();
</script>

</body>
</html>
