<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip — My life on the rawd</title>
<link href="fonts.css" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: center;
    padding: 22px 40px;
    background: rgba(22,20,18,0.96);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(8px);
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; flex-wrap: nowrap; gap: 16px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 10px 0;
    transition: color 0.25s ease;
  }

  nav a:hover { color: var(--ink); }

  /* Hero */
  .trip-hero {
    padding: 44px 40px 36px;
    border-bottom: 1px solid var(--line);
  }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    transition: color 0.2s;
  }

  .back:hover { color: var(--accent); }

  .trip-hero h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    text-transform: uppercase;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  .trip-hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding-right: 20px;
    margin-right: 20px;
    border-right: 1px solid var(--line);
  }

  .meta-item:last-child { border-right: none; padding-right: 0; margin-right: 0; }

  .meta-dot {
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Grid */
  .photo-grid {
    padding: 3px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .grid-row {
    display: grid;
    gap: 3px;
  }

  .grid-row.r-2-1 { grid-template-columns: 2fr 1fr; }
  .grid-row.r-3   { grid-template-columns: 1fr 1fr 1fr; }
  .grid-row.r-1-2 { grid-template-columns: 1fr 2fr; }
  .grid-row.r-1   { grid-template-columns: 1fr; }
  .grid-row.r-1-1 { grid-template-columns: 1fr 1fr; }

  /* Celle */
  .photo-cell {
    position: relative;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
  }

  .photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
    filter: grayscale(100%) contrast(1.05) brightness(0.88);
    transition: transform 1s cubic-bezier(0.16,1,0.3,1), filter 0.6s ease;
  }

  .photo-cell:hover img {
    transform: scale(1.04);
    filter: grayscale(0%) contrast(1) brightness(1);
  }

  .photo-cell .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .photo-cell:hover .overlay { opacity: 0.7; }

  .photo-cell .cell-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    transform: translateY(4px);
    opacity: 0;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .photo-cell:hover .cell-label { opacity: 1; transform: translateY(0); }

  .cell-cat {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
  }

  .cell-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.82rem;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Proporzioni per tipo di riga */
  .r-2-1 .photo-cell { aspect-ratio: unset; }
  .r-2-1 .photo-cell:first-child { aspect-ratio: 16/9; }
  .r-2-1 .photo-cell:last-child  { aspect-ratio: 16/9; }
  .r-3 .photo-cell   { aspect-ratio: 1/1; }
  .r-1-2 .photo-cell { aspect-ratio: 16/9; }
  .r-1 .photo-cell   { aspect-ratio: 3/1; }
  .r-1-1 .photo-cell { aspect-ratio: 4/3; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.94);
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
  }

  .lb-close {
    position: absolute;
    top: 20px; right: 26px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }

  .lb-close:hover { color: #fff; }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    font-size: 1.4rem;
    padding: 16px 20px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .lb-nav:hover { background: rgba(255,255,255,0.18); }
  .lb-nav.prev { left: 16px; }
  .lb-nav.next { right: 16px; }

  .lb-caption {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    text-align: center;
  }

  .empty-state {
    padding: 80px 40px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty-state a { color: var(--accent); text-decoration: underline; }

  footer {
    padding: 32px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
    margin-top: 40px;
  }

  @media (max-width: 860px) {
    header { padding: 18px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 14px; font-size: 0.7rem; }
    .trip-hero { padding: 32px 22px 28px; }
    .trip-hero h1 { font-size: clamp(1.8rem, 8vw, 3rem); }
    .grid-row.r-2-1 { grid-template-columns: 1fr 1fr; }
    .grid-row.r-1-2 { grid-template-columns: 1fr 1fr; }
    .grid-row.r-3   { grid-template-columns: 1fr 1fr; }
    .r-3 .photo-cell:last-child { display: none; }
    .grid-row.r-1   { }
    .r-1 .photo-cell { aspect-ratio: 16/9; }
    footer { padding: 24px 22px; }
  }

  @media (max-width: 520px) {
    .grid-row.r-2-1, .grid-row.r-1-2, .grid-row.r-3, .grid-row.r-1-1 { grid-template-columns: 1fr; }
    .r-3 .photo-cell:last-child { display: block; }
    .lb-nav { display: none; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">My life on the rawd</a>
  <nav>
    <a href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<div class="trip-hero">
  <a class="back" href="travel.html">← Back to trips</a>
  <h1 id="trip-title">Trip</h1>
  <div class="trip-hero-meta" id="trip-meta"></div>
</div>

<div class="photo-grid" id="photo-grid"></div>

<p class="empty-state" id="empty-state" hidden>
  No photos found for this trip. <a href="travel.html">Back to trips</a>.
</p>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav prev" onclick="navLb(-1,event)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav next" onclick="navLb(1,event)">›</button>
  <div class="lb-caption" id="lb-caption"></div>
</div>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const nomeViaggio = params.get('nome');

  let fotoDelViaggio = [];
  let lbIndex = 0;

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatCoords(lat, lng) {
    if (lat == null || lng == null) return '';
    return `${Math.abs(lat).toFixed(2)}°${lat>=0?'N':'S'} ${Math.abs(lng).toFixed(2)}°${lng>=0?'E':'W'}`;
  }

  function primaData(foto) {
    const d = foto.filter(f => f.data).map(f => f.data).sort()[0];
    if (!d) return '';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function primoLuogo(foto) {
    const luoghi = [...new Set(foto.map(f => f.luogo).filter(Boolean))];
    if (!luoghi.length) return '';
    // Estrae solo la città (prima parte prima della virgola)
    return luoghi[0].split(',')[0].trim();
  }

  // Pattern di layout ciclico
  const PATTERNS = [
    { cls: 'r-2-1', count: 2 },
    { cls: 'r-3',   count: 3 },
    { cls: 'r-1-2', count: 2 },
    { cls: 'r-1',   count: 1 },
  ];

  function buildGrid(foto) {
    const grid = document.getElementById('photo-grid');
    let i = 0;
    let patternIdx = 0;

    while (i < foto.length) {
      const pat = PATTERNS[patternIdx % PATTERNS.length];
      const slice = foto.slice(i, i + pat.count);
      if (!slice.length) break;

      const row = document.createElement('div');
      row.className = `grid-row ${pat.cls}`;

      // Se è l'ultima riga e ha meno foto del pattern, adatta il layout
      if (slice.length === 1 && pat.cls !== 'r-1') {
        row.className = 'grid-row r-1';
      } else if (slice.length === 2 && pat.cls === 'r-3') {
        row.className = 'grid-row r-1-1';
      }

      slice.forEach((photo, j) => {
        const idx = i + j;
        const src = photo.thumbnail_url || photo.immagine_url;
        const pos = photo.crop_position || 'center 30%';
        const cell = document.createElement('div');
        cell.className = 'photo-cell';
        cell.innerHTML = `
          <img src="${src}" alt="${escapeHtml(photo.titolo || '')}" loading="lazy" style="object-position:${pos}">
          <div class="overlay"></div>
          <div class="cell-label">
            <div class="cell-cat">${escapeHtml(photo.categoria || '')}</div>
            <div class="cell-name">${escapeHtml(photo.titolo || '')}</div>
          </div>
        `;
        cell.addEventListener('click', () => openLb(idx));
        row.appendChild(cell);
      });

      grid.appendChild(row);
      i += slice.length;
      patternIdx++;
    }
  }

  // Lightbox
  function openLb(idx) {
    lbIndex = idx;
    const foto = fotoDelViaggio[idx];
    document.getElementById('lb-img').src = foto.immagine_url;
    document.getElementById('lb-caption').textContent =
      foto.titolo + (foto.luogo ? '  ·  ' + foto.luogo : '');
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navLb(dir, e) {
    if (e) e.stopPropagation();
    lbIndex = (lbIndex + dir + fotoDelViaggio.length) % fotoDelViaggio.length;
    openLb(lbIndex);
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') navLb(1);
    if (e.key === 'ArrowLeft') navLb(-1);
  });

  async function loadTrip() {
    if (!nomeViaggio) {
      document.getElementById('trip-title').textContent = 'Trip not specified';
      document.getElementById('empty-state').hidden = false;
      return;
    }

    document.getElementById('trip-title').textContent = nomeViaggio;
    document.title = `${nomeViaggio} — My life on the rawd`;

    try {
      const res = await fetch('./foto.json');
      if (!res.ok) throw new Error();
      const photos = await res.json();

      fotoDelViaggio = photos.filter(p => p.viaggio === nomeViaggio && p.pubblicato !== false);

      if (!fotoDelViaggio.length) {
        document.getElementById('empty-state').hidden = false;
        return;
      }

      // Meta
      const meta = document.getElementById('trip-meta');
      const items = [
        { val: `${fotoDelViaggio.length} photo${fotoDelViaggio.length !== 1 ? 's' : ''}` },
        { val: primoLuogo(fotoDelViaggio) },
        { val: primaData(fotoDelViaggio) },
      ].filter(m => m.val);

      meta.innerHTML = items.map(m => `
        <div class="meta-item">
          <span class="meta-dot"></span>
          ${escapeHtml(m.val)}
        </div>
      `).join('');

      buildGrid(fotoDelViaggio);

    } catch {
      document.getElementById('empty-state').hidden = false;
      document.getElementById('empty-state').textContent = 'Could not load photos right now.';
    }
  }

  loadTrip();
</script>

<script src="theme-toggle.js"></script>
</body>
</html>
