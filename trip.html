<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip — My life on the rawd</title>
<link href="fonts.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
    --gap: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: center;
    gap: 10px 0;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; flex-wrap: nowrap; gap: 16px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 10px 0;
    transition: color 0.25s ease;
  }

  nav a:hover { color: var(--ink); }

  .breadcrumb {
    padding: 150px 40px 0;
    max-width: 1100px;
  }

  .breadcrumb a {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.03em;
  }

  .breadcrumb a:hover { color: var(--accent); }

  .trip-header {
    padding: 18px 40px 0;
    max-width: 1100px;
  }

  .trip-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .trip-header .count {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.88rem;
  }

  /* Mini-mappa */
  .trip-map-section {
    padding: 32px 40px 40px;
    max-width: 1100px;
  }

  #trip-map {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  #trip-map svg {
    width: 100%;
    height: auto;
    display: block;
  }

  #trip-map .land {
    fill: #2B2724;
    stroke: var(--bg);
    stroke-width: 0.5;
  }

  .trip-pin {
    cursor: default;
  }

  .trip-pin circle {
    fill: var(--accent);
    stroke: var(--bg);
    stroke-width: 1;
    transition: r 0.15s ease;
  }

  .trip-pin:hover circle { r: 7; }

  .trip-pin title { font-size: 0.75rem; }

  /* Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: 0 0 80px;
  }

  .item {
    position: relative;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--ink);
  }

  .item.wide { grid-column: span 2; }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    aspect-ratio: 4/5;
    filter: grayscale(100%) contrast(1.05);
    transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }

  .item.wide img { aspect-ratio: auto; height: 100%; }

  .item:hover img {
    transform: scale(1.035);
    filter: grayscale(0%) contrast(1);
  }

  .item-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    justify-content: space-between;
    align-items: flex-end;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .item:hover .item-meta { opacity: 1; transform: translateY(0); }

  .item-meta .titolo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
  }

  .item-meta .coords {
    font-size: 0.65rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .empty-state {
    padding: 60px 40px;
    max-width: 720px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty-state a { color: var(--accent); text-decoration: underline; }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .breadcrumb { padding: 125px 22px 0; }
    .trip-header { padding: 14px 22px 0; }
    .trip-map-section { padding: 24px 22px 32px; }
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .item.wide { grid-column: span 2; }
    footer { padding: 24px 22px 32px; }
  }

  @media (max-width: 520px) {
    .gallery { grid-template-columns: 1fr; }
    .item.wide { grid-column: span 1; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">My life on the rawd</a>
  <nav>
    <a href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<p class="breadcrumb"><a href="travel.html">← Back to trips</a></p>

<div class="trip-header">
  <h1 id="trip-title">Trip</h1>
  <p class="count" id="trip-count"></p>
</div>

<div class="trip-map-section">
  <div id="trip-map"></div>
</div>

<div class="gallery" id="gallery"></div>

<p class="empty-state" id="empty-state" hidden>
  No photos found for this trip. <a href="travel.html">Back to trips</a>.
</p>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const nomeViaggio = params.get('nome');

  const titleEl   = document.getElementById('trip-title');
  const countEl   = document.getElementById('trip-count');
  const gallery   = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');
  const mapContainer = document.getElementById('trip-map');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatCoords(lat, lng) {
    if (lat == null || lng == null || lat === '' || lng === '') return '';
    const ns = lat >= 0 ? 'N' : 'S';
    const ew = lng >= 0 ? 'E' : 'W';
    return `${Math.abs(lat).toFixed(2)}° ${ns}, ${Math.abs(lng).toFixed(2)}° ${ew}`;
  }

  function layoutClass(index, totale) {
    if (totale < 4) return '';
    if (index % 4 === 0) return 'wide';
    return '';
  }

  // --- Mini-mappa ---
  async function renderMiniMappa(fotoConCoordinate) {
    if (fotoConCoordinate.length === 0) {
      mapContainer.style.display = 'none';
      return;
    }

    const MAP_W = 680;
    const MAP_H = 320;
    const PAD   = 40; // padding interno in px per non tagliare i pin ai bordi

    let world;
    try {
      world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
    } catch {
      mapContainer.style.display = 'none';
      return;
    }

    const land = topojson.feature(world, world.objects.land);

    // Calcola il bounding box delle coordinate del viaggio
    const lats = fotoConCoordinate.map(p => p.lat);
    const lngs = fotoConCoordinate.map(p => p.lng);
    const minLat = Math.min(...lats);
    const maxLat = Math.max(...lats);
    const minLng = Math.min(...lngs);
    const maxLng = Math.max(...lngs);

    // Margine fisso in gradi — abbastanza per vedere il contesto immediato
    // senza mostrare mezzo continente. Se le foto coprono già un'area ampia
    // (es. viaggio cross-country) il margine rimane proporzionalmente piccolo.
    const dLat = maxLat - minLat;
    const dLng = maxLng - minLng;
    const margLat = Math.max(dLat * 0.15, 1.5);  // minimo 1.5° (~165 km)
    const margLng = Math.max(dLng * 0.15, 1.5);

    // GeoJSON del bounding box del viaggio (con margine)
    const bbox = {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [minLng - margLng, minLat - margLat],
          [maxLng + margLng, minLat - margLat],
          [maxLng + margLng, maxLat + margLat],
          [minLng - margLng, maxLat + margLat],
          [minLng - margLng, minLat - margLat],
        ]]
      }
    };

    const projection = d3.geoNaturalEarth1()
      .fitExtent([[PAD, PAD], [MAP_W - PAD, MAP_H - PAD]], bbox);

    const path = d3.geoPath(projection);

    const svg = d3.select(mapContainer)
      .append('svg')
      .attr('viewBox', `0 0 ${MAP_W} ${MAP_H}`);

    svg.append('path')
      .datum(land)
      .attr('class', 'land')
      .attr('d', path);

    // Pin per ogni foto con coordinate
    const pins = svg.selectAll('g.trip-pin')
      .data(fotoConCoordinate)
      .enter()
      .append('g')
      .attr('class', 'trip-pin')
      .attr('transform', p => {
        const [x, y] = projection([p.lng, p.lat]) || [-9999, -9999];
        return `translate(${x},${y})`;
      });

    pins.append('title').text(p => p.titolo || formatCoords(p.lat, p.lng));
    pins.append('circle').attr('r', 5);
  }

  // --- Carica dati e disegna ---
  async function loadTrip() {
    if (!nomeViaggio) {
      titleEl.textContent = 'Trip not specified';
      emptyState.hidden = false;
      mapContainer.style.display = 'none';
      return;
    }

    titleEl.textContent = nomeViaggio;
    document.title = `${nomeViaggio} — My life on the rawd`;

    try {
      const res = await fetch('./foto.json');
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      const photos = await res.json();

      const fotoDelViaggio = photos.filter(p =>
        p.viaggio === nomeViaggio && p.pubblicato !== false
      );

      if (fotoDelViaggio.length === 0) {
        emptyState.hidden = false;
        countEl.textContent = '';
        mapContainer.style.display = 'none';
        return;
      }

      countEl.textContent = fotoDelViaggio.length === 1
        ? '1 photo'
        : `${fotoDelViaggio.length} photos`;

      // Mini-mappa solo per le foto con coordinate
      const conCoordinate = fotoDelViaggio.filter(p => p.lat != null && p.lng != null);
      await renderMiniMappa(conCoordinate);

      // Galleria — usa thumbnail_url se disponibile
      gallery.innerHTML = fotoDelViaggio.map((photo, i) => `
        <div class="item ${layoutClass(i, fotoDelViaggio.length)}">
          <img
            src="${photo.immagine_url}"
            alt="${escapeHtml(photo.titolo || '')}"
            loading="lazy"
            ${photo.crop_position ? `style="object-position: ${escapeHtml(photo.crop_position)}"` : ''}
          >
          <div class="item-meta">
            <span class="titolo">${escapeHtml(photo.titolo || '')}</span>
            <span class="coords">${formatCoords(photo.lat, photo.lng)}</span>
          </div>
        </div>
      `).join('');

    } catch (err) {
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load photos right now.';
      mapContainer.style.display = 'none';
      console.error('Error loading trip:', err);
    }
  }

  loadTrip();
</script>

<script src="theme-toggle.js"></script>
</body>
</html>
