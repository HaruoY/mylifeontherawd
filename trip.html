<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
    --gap: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a:hover { color: var(--ink); }

  .breadcrumb {
    padding: 130px 40px 0;
    max-width: 720px;
  }

  .breadcrumb a {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.03em;
  }

  .breadcrumb a:hover { color: var(--accent); }

  .trip-header {
    padding: 18px 40px 48px;
    max-width: 720px;
  }

  .trip-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .trip-header .count {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.88rem;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: 0 0 80px;
  }

  .item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
  }

  .item.wide { grid-column: span 2; }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    aspect-ratio: 4/5;
    filter: grayscale(10%) contrast(1.05);
    transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }

  .item.wide img { aspect-ratio: auto; height: 100%; }

  .item:hover img {
    transform: scale(1.035);
    filter: grayscale(0%) contrast(1);
  }

  .item-meta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .item:hover .item-meta { opacity: 1; transform: translateY(0); }

  .item-meta .titolo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
  }

  .empty-state {
    padding: 60px 40px;
    max-width: 720px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty-state a { color: var(--accent); text-decoration: underline; }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .breadcrumb { padding: 110px 22px 0; }
    .trip-header { padding: 14px 22px 32px; }
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .item.wide { grid-column: span 2; }
    footer { padding: 24px 22px 32px; }
  }

  @media (max-width: 520px) {
    .gallery { grid-template-columns: 1fr; }
    .item.wide { grid-column: span 1; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a href="gallery.html">Gallery</a>
    <a href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<p class="breadcrumb"><a href="travel.html">← Back to trips</a></p>

<div class="trip-header">
  <h1 id="trip-title">Trip</h1>
  <p class="count" id="trip-count"></p>
</div>

<div class="gallery" id="gallery"></div>

<p class="empty-state" id="empty-state" hidden>
  No photos found for this trip. <a href="travel.html">Back to trips</a>.
</p>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const nomeViaggio = params.get('nome');

  const titleEl = document.getElementById('trip-title');
  const countEl = document.getElementById('trip-count');
  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function layoutClass(index) {
    if (index % 4 === 0) return 'wide';
    return '';
  }

  async function loadTrip() {
    if (!nomeViaggio) {
      titleEl.textContent = 'Trip not specified';
      emptyState.hidden = false;
      return;
    }

    titleEl.textContent = nomeViaggio;
    document.title = `${nomeViaggio} — My life on the rawd`;

    try {
      const res = await fetch('./foto.json');
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      const photos = await res.json();

      const fotoDelViaggio = photos.filter(p => p.viaggio === nomeViaggio && p.pubblicato !== false);

      if (fotoDelViaggio.length === 0) {
        emptyState.hidden = false;
        countEl.textContent = '';
        return;
      }

      countEl.textContent = fotoDelViaggio.length === 1
        ? '1 photo'
        : `${fotoDelViaggio.length} photos`;

      gallery.innerHTML = fotoDelViaggio.map((photo, i) => `
        <a class="item ${layoutClass(i)}" href="${photo.immagine_url}" target="_blank" rel="noopener">
          <img src="${photo.immagine_url}" alt="${escapeHtml(photo.titolo || '')}" loading="lazy">
          <div class="item-meta">
            <span class="titolo">${escapeHtml(photo.titolo || '')}</span>
          </div>
        </a>
      `).join('');
    } catch (err) {
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load photos right now.';
      console.error('Error loading trip:', err);
    }
  }

  loadTrip();
</script>

</body>
</html>
