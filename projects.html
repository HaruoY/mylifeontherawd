<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main {
    padding: 160px 40px 100px;
    max-width: 1100px;
  }

  .page-intro {
    max-width: 560px;
    margin-bottom: 56px;
  }

  .page-intro h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  .page-intro h1 .accent { color: var(--accent); }

  .page-intro p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.65;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    transition: border-color 0.25s ease;
  }

  .project-card:hover { border-color: var(--accent); }

  .project-card .count {
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .project-card h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.15rem;
    margin-bottom: 8px;
  }

  .project-card p {
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .empty-projects {
    padding: 60px 0;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 4px;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    main { padding: 130px 22px 70px; }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a href="gallery.html">Gallery</a>
    <a href="bio.html">Bio</a>
    <a class="active" href="projects.html">Projects</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <div class="page-intro">
    <h1>Themed <span class="accent">projects</span></h1>
    <p>
      Collections outside the main travel flow: photo series organized by
      theme rather than location.
    </p>
  </div>

  <div class="projects-grid" id="projects-grid"></div>

  <p class="empty-projects" id="empty-projects" hidden>
    No projects published yet. Projects will appear here as they're ready.
  </p>
</main>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const progetti = [
    {
      titolo: "Art around the world",
      descrizione: "Artworks and details encountered while traveling.",
      numeroScatti: 0
    }
  ];

  const grid = document.getElementById('projects-grid');
  const emptyState = document.getElementById('empty-projects');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderProjects() {
    if (progetti.length === 0) {
      emptyState.hidden = false;
      return;
    }

    grid.innerHTML = progetti.map(p => {
      const contenuto = `
        <div class="count">${p.numeroScatti || 0} photos</div>
        <h2>${escapeHtml(p.titolo)}</h2>
        <p>${escapeHtml(p.descrizione || '')}</p>
      `;
      return p.link
        ? `<a class="project-card" href="${p.link}">${contenuto}</a>`
        : `<div class="project-card">${contenuto}</div>`;
    }).join('');
  }

  renderProjects();
</script>

</body>
</html>
