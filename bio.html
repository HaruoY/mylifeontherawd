<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --ink: #1D191A;
    --muted: #6B6B63;
    --accent: #EE1337;
    --line: rgba(10,10,10,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(250,250,248,0.92), rgba(250,250,248,0));
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main {
    padding: 160px 40px 100px;
    max-width: 640px;
    flex: 1;
    display: flex;
    align-items: center;
  }

  .statement {
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    line-height: 1.4;
    letter-spacing: 0.01em;
    color: var(--accent);
    max-width: 600px;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    main { padding: 130px 22px 70px; }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a href="index.html">Home</a>
    <a class="active" href="bio.html">Bio</a>
    <a href="projects.html">Projects</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <p class="statement">Just picked up a camera and started taking photos.</p>
</main>

<footer>
  <span>© 2026 — Tutti i diritti riservati</span>
</footer>

</body>
</html>
