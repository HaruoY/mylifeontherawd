<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="geo.js"></script>
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main { flex: 1; }

  .intro {
    padding: 150px 40px 36px;
    max-width: 760px;
  }

  .intro .label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .intro h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line);
    margin: 0 40px 48px;
    border: 1px solid var(--line);
  }

  .stat {
    background: var(--surface);
    padding: 28px 24px;
    text-align: center;
  }

  .stat .value {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--accent);
    line-height: 1;
  }

  .stat .label {
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }

  .map-section {
    padding: 0 40px 56px;
  }

  #world-map { width: 100%; }

  #world-map svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  #world-map .land {
    fill: #2B2724;
    stroke: var(--bg);
    stroke-width: 0.75;
  }

  .map-marker { cursor: pointer; }

  .map-marker circle.dot {
    fill: var(--accent);
    transition: r 0.2s ease;
  }

  .map-marker:hover circle.dot {
    r: 7;
  }

  .map-caption {
    margin-top: 14px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    .intro { padding: 110px 22px 28px; }
    .stats-row { margin: 0 22px 36px; }
    .map-section { padding: 0 22px 40px; }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">My life on the rawd</div>
  <nav>
    <a href="gallery.html">Gallery</a>
    <a href="travel.html">Travel</a>
    <a class="active" href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <section class="intro">
    <div class="label">Statistics</div>
    <h1>The road so far</h1>
  </section>

  <div class="stats-row" id="stats-row">
    <div class="stat">
      <div class="value" id="stat-countries">—</div>
      <div class="label">Countries</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-cities">—</div>
      <div class="label">Cities</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-photos">—</div>
      <div class="label">Photos</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-km">—</div>
      <div class="label">Km traveled (est.)</div>
    </div>
  </div>

  <section class="map-section">
    <div id="world-map" role="img" aria-label="Map of visited locations, clickable"></div>
    <p class="map-caption" id="map-caption"></p>
  </section>
</main>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const API_URL = './foto.json';
  const mapCaption = document.getElementById('map-caption');

  let photos = [];

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function distanzaKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function calcolaKmTotali(fotoConCoordinate) {
    const ordinate = [...fotoConCoordinate].sort((a, b) =>
      new Date(a.data || 0) - new Date(b.data || 0)
    );
    let totale = 0;
    for (let i = 1; i < ordinate.length; i++) {
      totale += distanzaKm(
        ordinate[i - 1].lat, ordinate[i - 1].lng,
        ordinate[i].lat, ordinate[i].lng
      );
    }
    return Math.round(totale);
  }

  function aggiornaStatistiche(fotoConCoordinate, nazioniUniche) {
    const cittaUniche = new Set(fotoConCoordinate.map(p => p.luogo)).size;
    const km = calcolaKmTotali(fotoConCoordinate);

    document.getElementById('stat-countries').textContent = nazioniUniche.length;
    document.getElementById('stat-cities').textContent = cittaUniche;
    document.getElementById('stat-photos').textContent = photos.filter(p => p.pubblicato !== false).length;
    document.getElementById('stat-km').textContent = km.toLocaleString('en-US');
  }

  const mapContainer = document.getElementById('world-map');
  let mapProjection = null;
  let mapSvg = null;
  let worldLoaded = false;
  let renderMapInCorso = false;
  let renderMapRichiestaPendente = false;

  const MAP_WIDTH = 680;
  const MAP_HEIGHT = 360;

  async function initMap() {
    try {
      const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
      const land = topojson.feature(world, world.objects.land);

      const projection = d3.geoNaturalEarth1().fitSize([MAP_WIDTH, MAP_HEIGHT], land);
      mapProjection = projection;

      const path = d3.geoPath(projection);

      mapSvg = d3.select(mapContainer)
        .append('svg')
        .attr('viewBox', `0 0 ${MAP_WIDTH} ${MAP_HEIGHT}`);

      mapSvg.append('path').datum(land).attr('class', 'land').attr('d', path);
      mapSvg.append('g').attr('id', 'map-markers-layer');

      worldLoaded = true;
      renderMap();
    } catch (err) {
      console.error('Could not load map data:', err);
      mapCaption.textContent = '';
    }
  }

  async function renderMap() {
    if (!worldLoaded || !mapProjection) return;
    if (renderMapInCorso) {
      renderMapRichiestaPendente = true;
      return;
    }
    renderMapInCorso = true;
    try {
      await renderMapEsegui();
      while (renderMapRichiestaPendente) {
        renderMapRichiestaPendente = false;
        await renderMapEsegui();
      }
    } finally {
      renderMapInCorso = false;
    }
  }

  async function renderMapEsegui() {
    const luoghiConCoordinate = photos.filter(p => p.lat != null && p.lng != null && p.luogo);

    if (luoghiConCoordinate.length === 0) {
      mapCaption.textContent = 'No locations yet.';
      aggiornaStatistiche([], []);
      return;
    }

    mapCaption.textContent = 'Finding visited countries…';

    const nazioniMap = new Map();
    for (const p of luoghiConCoordinate) {
      const risultato = await getNazione(p.lat, p.lng);
      if (!risultato) continue;
      if (!nazioniMap.has(risultato.nome)) {
        nazioniMap.set(risultato.nome, { nazione: risultato.nome, codice: risultato.codice, lat: p.lat, lng: p.lng });
      }
    }

    const nazioniUniche = Array.from(nazioniMap.values());

    aggiornaStatistiche(luoghiConCoordinate, nazioniUniche);

    const markersLayer = mapSvg.select('#map-markers-layer');

    const markers = markersLayer.selectAll('a.map-marker')
      .data(nazioniUniche, d => d.nazione);

    markers.exit().remove();

    const entered = markers.enter().append('a').attr('class', 'map-marker');

    entered.append('title');
    entered.append('circle').attr('class', 'dot').attr('r', 5);

    const all = entered.merge(markers);

    all.select('title').text(d => d.nazione);
    all.attr('transform', d => {
      const coords = mapProjection([d.lng, d.lat]) || [-9999, -9999];
      return `translate(${coords[0]},${coords[1]})`;
    });

    if (nazioniUniche.length === 0) {
      mapCaption.textContent = 'No locations yet.';
    } else if (nazioniUniche.length === 1) {
      mapCaption.textContent = '1 country visited so far.';
    } else {
      mapCaption.textContent = `${nazioniUniche.length} countries visited so far.`;
    }
  }

  async function loadPhotos() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      photos = await res.json();
      renderMap();
    } catch (err) {
      mapCaption.textContent = '';
      console.error('Error loading photos:', err);
    }
  }

  Promise.all([loadPhotos(), initMap()]);
</script>

</body>
</html>
