<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel — My life on the rawd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1E1B18;
    --ink: #F2EEE4;
    --muted: #9B9690;
    --accent: #EE1337;
    --line: #3A3633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    background: linear-gradient(to bottom, rgba(22,20,18,0.92), rgba(22,20,18,0));
  }

  .logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  nav { display: flex; gap: 28px; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }

  nav a {
    color: var(--muted);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  nav a:hover { color: var(--ink); }
  nav a.active { color: var(--ink); }
  nav a.active::after { transform: scaleX(1); }

  main {
    padding: 160px 40px 100px;
    max-width: 1100px;
  }

  .page-intro {
    max-width: 560px;
    margin-bottom: 56px;
  }

  .page-intro .label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .page-intro h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .trip-card {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    aspect-ratio: 4/3;
    background: var(--surface);
  }

  .trip-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(10%) contrast(1.05);
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  }

  .trip-card:hover img {
    transform: scale(1.04);
    filter: grayscale(0%) contrast(1);
  }

  .trip-card .overlay {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 18px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    color: #fff;
  }

  .trip-card .overlay .trip-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.05rem;
    text-transform: uppercase;
  }

  .trip-card .overlay .trip-count {
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-top: 4px;
  }

  .empty-state {
    padding: 60px 0;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 4px;
  }

  footer {
    padding: 32px 40px 40px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 860px) {
    header { padding: 20px 22px; }
    .logo { font-size: 0.85rem; }
    nav { gap: 16px; font-size: 0.7rem; }
    main { padding: 130px 22px 70px; }
    .trips-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    footer { padding: 24px 22px 32px; }
  }

  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">My life on the rawd</a>
  <nav>
    <a class="active" href="travel.html">Travel</a>
    <a href="map.html">Map</a>
    <a href="blog.html">Blog</a>
    <a href="bio.html">Bio</a>
    <a href="gear.html">Gear</a>
  </nav>
</header>

<main>
  <div class="page-intro">
    <div class="label">Travel</div>
    <h1>One album per trip</h1>
  </div>

  <div class="trips-grid" id="trips-grid"></div>

  <p class="empty-state" id="empty-state" hidden>
    No trips published yet.
  </p>
</main>

<footer>
  <span>© 2026 — All rights reserved</span>
</footer>

<script>
  const grid = document.getElementById('trips-grid');
  const emptyState = document.getElementById('empty-state');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function loadTrips() {
    try {
      const res = await fetch('./foto.json');
      if (!res.ok) throw new Error(`Invalid response: ${res.status}`);
      const photos = await res.json();

      const fotoConViaggio = photos.filter(p => p.viaggio && p.pubblicato !== false);

      if (fotoConViaggio.length === 0) {
        emptyState.hidden = false;
        return;
      }

      const viaggiMap = new Map();
      fotoConViaggio.forEach(p => {
        if (!viaggiMap.has(p.viaggio)) {
          viaggiMap.set(p.viaggio, { copertina: p.immagine_url, count: 0 });
        }
        viaggiMap.get(p.viaggio).count++;
      });

      const viaggi = Array.from(viaggiMap.entries());

      grid.innerHTML = viaggi.map(([nomeViaggio, info]) => `
        <a class="trip-card" href="trip.html?nome=${encodeURIComponent(nomeViaggio)}">
          <img src="${info.copertina}" alt="${escapeHtml(nomeViaggio)}" loading="lazy">
          <div class="overlay">
            <div class="trip-name">${escapeHtml(nomeViaggio)}</div>
            <div class="trip-count">${info.count === 1 ? '1 photo' : info.count + ' photos'}</div>
          </div>
        </a>
      `).join('');
    } catch (err) {
      emptyState.hidden = false;
      emptyState.textContent = 'Could not load trips right now.';
      console.error('Error loading trips:', err);
    }
  }

  loadTrips();
</script>

</body>
</html>
